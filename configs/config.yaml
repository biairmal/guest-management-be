logger:
  level: debug # debug, info, warn, error, fatal, panic
  output: ${LOG_OUTPUT:stdout} # stdout, stderr, file
  format: text # json, text
  # ===== Rotation is only used if Output is file ===== #
  rotation:
    filename: logs/app.log
  #   max_size: 100MB
  #   max_age: 7d
  #   max_backups: 3
  #   compress: false
  #   local_time: false

server:
  host: ${SERVER_HOST:127.0.0.1}
  port: ${SERVER_PORT:8080}
  read_header_timeout: ${SERVER_READ_HEADER_TIMEOUT:5s}
  read_timeout: ${SERVER_READ_TIMEOUT:15s}
  write_timeout: ${SERVER_WRITE_TIMEOUT:15s}
  shutdown_timeout: ${SERVER_SHUTDOWN_TIMEOUT:30s}

database:
  leader:
    driver: postgres
    host: ${DATABASE_HOST}
    port: ${DATABASE_PORT}
    database: ${DATABASE_DATABASE}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    ssl_mode: ${DATABASE_SSL_MODE:disable}
    connect_timeout: ${DATABASE_CONNECT_TIMEOUT:5s}
    max_retries: ${DATABASE_MAX_RETRIES:3}

redis:
  mode: standalone
  address: ${REDIS_HOST:localhost}:${REDIS_PORT:6379}
  username: ${REDIS_USERNAME:default}
  password: ${REDIS_PASSWORD}
  db: ${REDIS_DB:0}

validator:
  tag_name: validate
  field_name_tag: json # error field names match the JSON body, not Go field names

swagger:
  enabled: ${SWAGGER_ENABLED:true}
  username: ${SWAGGER_USERNAME}
  password: ${SWAGGER_PASSWORD}

tracing:
  enabled: ${TRACING_ENABLED:false}
  tracer:
    service_name: guest-management-be
    service_version: ${APP_VERSION:0.0.0}
    endpoint: ${TRACING_ENDPOINT:localhost:4317}
    insecure: ${TRACING_INSECURE:true}
    sample_rate: ${TRACING_SAMPLE_RATE:1.0}

# Per-feature config: app.<feature>.<layer>.*. Each feature's config is one
# contiguous block (easy to lift out if the feature becomes its own service),
# separated by layer inside it. Layers with nothing to configure yet (e.g.
# events' service/handler) are omitted rather than stubbed out empty.
app:
  events:
    repository:
      category_cache:
        enabled: true
        ttl: 5m
        prefix: guest-management
        strategy: write_around # write_around, write_through, write_behind
